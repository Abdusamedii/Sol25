services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sol25
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sol25"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/sol25
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
      WEB_ORIGIN: http://localhost:5173
      JWT_SECRET: sol25-docker-jwt-secret-change-me
    ports:
      - "3000:3000"
    command: >
      sh -c "node apps/api/dist/db/migrate.js &&
             node apps/api/dist/db/seed-if-empty.js &&
             node apps/api/dist/server.js"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres-data:
