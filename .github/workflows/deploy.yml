name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}

    steps:
      - name: Resolve deploy revision
        id: revision
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.revision.outputs.sha }}

      - name: Build API container
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t "sol25-api:${{ steps.revision.outputs.sha }}" \
            .

      - name: Build Web container
        run: |
          docker build \
            -f apps/web/Dockerfile \
            --build-arg "VITE_API_URL=http://${{ secrets.DEPLOY_PUBLIC_HOST }}:3000" \
            -t "sol25-web:${{ steps.revision.outputs.sha }}" \
            .

      - name: Package containers for transfer
        run: |
          docker save \
            "sol25-api:${{ steps.revision.outputs.sha }}" \
            "sol25-web:${{ steps.revision.outputs.sha }}" \
            | gzip -1 > sol25-images.tar.gz
          ls -lh sol25-images.tar.gz

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

          if [ -n "${SSH_PASSPHRASE}" ]; then
            PASSPHRASE="$(printf '%s' "$SSH_PASSPHRASE" | tr -d '\r')"
            printf '#!/bin/sh\necho "%s"\n' "$PASSPHRASE" > /tmp/askpass.sh
            chmod +x /tmp/askpass.sh
            export SSH_ASKPASS=/tmp/askpass.sh
            export SSH_ASKPASS_REQUIRE=force
            export DISPLAY=:0
          fi

          if ! ssh-add ~/.ssh/deploy_key; then
            echo "::error::Could not load SSH key."
            echo "If your key has NO passphrase, delete the SSH_PASSPHRASE secret."
            echo "If it has a passphrase, verify SSH_PRIVATE_KEY and SSH_PASSPHRASE."
            echo "Recommended: run scripts/generate-deploy-key.sh and update GitHub secrets."
            exit 1
          fi

          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Verify SSH connection
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=20 "${SSH_USER}@${SSH_HOST}" "echo SSH connection OK"

      - name: Upload containers to server
        run: |
          scp -o BatchMode=yes sol25-images.tar.gz "${SSH_USER}@${SSH_HOST}:/tmp/sol25-images.tar.gz"

      - name: Upload secrets file to server
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          # base64-encode each secret so special characters survive the file transfer
          printf 'POSTGRES_PASSWORD_B64=%s\nJWT_SECRET_B64=%s\n' \
            "$(printf '%s' "$POSTGRES_PASSWORD" | base64 -w0)" \
            "$(printf '%s' "$JWT_SECRET"         | base64 -w0)" \
            > /tmp/sol25-secrets.env
          scp -o BatchMode=yes /tmp/sol25-secrets.env "${SSH_USER}@${SSH_HOST}:/tmp/sol25-secrets.env"
          rm -f /tmp/sol25-secrets.env

      - name: Load containers and start stack
        env:
          DEPLOY_PUBLIC_HOST: ${{ secrets.DEPLOY_PUBLIC_HOST }}
          GIT_REF: ${{ steps.revision.outputs.ref }}
          GIT_SHA: ${{ steps.revision.outputs.sha }}
          API_IMAGE: sol25-api:${{ steps.revision.outputs.sha }}
          WEB_IMAGE: sol25-web:${{ steps.revision.outputs.sha }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ssh -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            DEPLOY_PUBLIC_HOST="$DEPLOY_PUBLIC_HOST" \
            REPO_URL="$REPO_URL" \
            GIT_REF="$GIT_REF" \
            GIT_SHA="$GIT_SHA" \
            API_IMAGE="$API_IMAGE" \
            WEB_IMAGE="$WEB_IMAGE" \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            'bash -s' <<'REMOTE'
          set -euo pipefail

          # decode secrets from file (avoids inline env-var SSH passing issues)
          if [[ -f /tmp/sol25-secrets.env ]]; then
            source /tmp/sol25-secrets.env
            rm -f /tmp/sol25-secrets.env
          fi
          export POSTGRES_PASSWORD="$(printf '%s' "${POSTGRES_PASSWORD_B64:-}" | base64 -d)"
          export JWT_SECRET="$(printf '%s' "${JWT_SECRET_B64:-}" | base64 -d)"

          gunzip -c /tmp/sol25-images.tar.gz | docker load
          rm -f /tmp/sol25-images.tar.gz

          APP_DIR="/opt/sol25"
          DEPLOY_SCRIPT="${APP_DIR}/scripts/deploy-remote.sh"

          run_deploy() {
            export APP_DIR REPO_URL GIT_REF GIT_SHA DEPLOY_PUBLIC_HOST POSTGRES_PASSWORD JWT_SECRET
            export API_IMAGE WEB_IMAGE
            "$1"
          }

          if [[ -x "${DEPLOY_SCRIPT}" ]]; then
            run_deploy "${DEPLOY_SCRIPT}"
          else
            mkdir -p "${APP_DIR}/scripts"
            curl -fsSL "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GIT_SHA}/scripts/deploy-remote.sh" \
              -o /tmp/deploy-remote.sh
            chmod +x /tmp/deploy-remote.sh
            run_deploy /tmp/deploy-remote.sh
          fi
          REMOTE

      - name: Verify deployment
        run: |
          HOST="${{ secrets.DEPLOY_PUBLIC_HOST }}"
          for i in $(seq 1 18); do
            if curl -fsS "http://${HOST}/" >/dev/null && curl -fsS "http://${HOST}:3000/health" >/dev/null; then
              echo "Web (port 80) and API (port 3000) are reachable."
              exit 0
            fi
            echo "Waiting for services (${i}/18)..."
            sleep 10
          done
          echo "Deployment verification failed."
          exit 1
