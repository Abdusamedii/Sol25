services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sol25
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sol25']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    image: ${API_IMAGE:-sol25-api:local}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      HOST: ${HOST:-0.0.0.0}
      NODE_ENV: production
      PORT: ${PORT:-3000}
      WEB_ORIGIN: ${WEB_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - '0.0.0.0:3000:3000'
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE:-sol25-web:local}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - api
    ports:
      - '0.0.0.0:80:80'
    restart: unless-stopped

volumes:
  postgres-data:
